<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>

<body>
    <form>
        <h1> Datos generales </h1>
        <label for="equipo">Nombre del equipo:</label>
        <input placeholder="Mi-PC" type="text" id="equipo" name="equipo">

        <br>

        <h1> Componentes </h1>
        <h2> CPU</h2>

        <label for="cpu_marca">Marca:</label>
        <input placeholder="Ej: AMD o Intel" id="cpu_marca" name="cpu_marca">
        <br>
        <label for="cpu_modelo">Modelo:</label>
        <input placeholder="Ej: Ryzen 5 5600G" id="cpu_modelo" name="cpu_modelo">

        <br>

        <h2> RAM</h2>

        <label for="ram_marca">Marca:</label>
        <input placeholder="Ej: Kingston" id="ram_marca" name="ram_marca">
        <br>
        <label for="ram_modelo">Modelo:</label>
        <input placeholder="Ej: Fury Beast DDR4" id="ram_modelo" name="ram_modelo">
        <br>
        <label for="ram_capacidad">Capacidad:</label>
        <input placeholder="Ej: 8 GB" id="ram_capacidad" name="ram_capacidad">
        <br>
        <label for="ram_cantidad">Cantidad:</label>
        <input placeholder="Ej: 2 Modulos" id="ram_cantidad" name="ram_cantidad">

        <br>

        <h2> Placa madre</h2>

        <label for="mb_marca">Marca:</label>
        <input placeholder="Ej: ASUS" id="mb_marca" name="mb_marca">
        <br>
        <label for="mb_modelo">Modelo:</label>
        <input placeholder="Ej: PRIME B450M-A II" id="mb_modelo" name="mb_modelo">
        <br>

        <h2>Graficos</h2>

        <label for="graficos_tipo">Tipo:</label>
        <input placeholder="Ej: Integrada o Dedicada" id="graficos_tipo" name="graficos_tipo">
        <br>
        <label for="graficos_modelo">Modelo:</label>
        <input placeholder="Ej: NVIDIA GTX 1660 Super" id="graficos_modelo" name="graficos_modelo">
        <br>

        <h2>Almacenamiento</h2>

        <label for="storage_tipo">Tipo:</label>
        <input placeholder="Ej: SSD, HDD o NVMe" id="storage_tipo" name="storage_tipo">
        <br>
        <label for="storage_capacidad">Capacidad:</label>
        <input placeholder="EJ: 480GB " id="storage_capacidad" name="storage_capacidad">
        <br>
        <label for="storage_vida">Vida util:</label>
        <select id="storage_vida" name="storage_vida">
            <option value="excelente">Excelente</option>
            <option value="alta">Alta</option>
            <option value="regular">Regular</option>
            <option value="baja">Baja</option>
        </select>
        <br>

        <h2>Fuente de alimentación</h2>

        <label for="fuente_modelo">Modelo:</label>
        <input placeholder="Ej: Corsair CV550" id="fuente_modelo" name="fuente_modelo">
        <br>
        <label for="fuente_potencia">Watts:</label>
        <input placeholder="Ej: 550W" id="fuente_potencia" name="fuente_potencia">
        <br>
        <label for="fuente_cert">Certificación:</label>
        <select id="fuente_cert" name="fuente_cert">
            <option value="titanium">80 plus titanium</option>
            <option value="platinum">80 plus platinum</option>
            <option value="gold">80 plus gold</option>
            <option value="silver">80 plus silver</option>
            <option value="bronze">80 plus bronze</option>
            <option value="80plus">80 plus</option>
            <option value="nocertificada">Sin certificación</option>
        </select>

        <br>
        <br>

        <h2>Observaciones: </h2>
        <label for="detalle"></label>
        <textarea placeholder="Ej: Equipo en buen estado general, requiere limpieza interna." id="detalle"
            name="detalle"></textarea>

        <br><br>

        <button type="submit">Enviar</button>

    </form>
</body>

</html>
